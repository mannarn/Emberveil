# fly.toml — Emberveil Relay
# Generated for fly.io deployment
# Run: fly launch (first time) or fly deploy (subsequent)

app = "emberveil-relay"
primary_region = "sin"  # Singapore — closest to Chennai

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep always-on (important for nonce store)
  auto_start_machines = true
  min_machines_running = 1     # Always at least 1 instance running

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
